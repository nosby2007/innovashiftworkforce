    description, canonical, and OG/Twitter tags per public route once
    Angular bootstraps, but that only reaches crawlers that execute JS.
    Bots/unfurlers that don't (most social link previews, some search
    engines) only ever see what's written here — keep these reasonably
    accurate for the homepage even as SeoService's copy evolves per route.
  -->
