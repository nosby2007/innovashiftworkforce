name: Android — Distribute to Firebase

on:
  push:
    branches: [main]
    paths:
      - 'frontend-angular/**'
      - '.github/workflows/android-distribute.yml'
  workflow_dispatch: {}

concurrency:
  group: android-distribute-main
  cancel-in-progress: false

jobs:
  build-and-distribute:
    name: Build APK & distribute to testers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install & build web app
        working-directory: frontend-angular
        run: |
          npm ci
          npm run build

      - name: Sync Capacitor Android project
        working-directory: frontend-angular
        run: npx cap sync android

      - name: Build debug APK
        working-directory: frontend-angular/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
        # No release signing keystore exists yet, so this ships a debug-signed
        # build — fine for internal testers via App Distribution, but a real
        # Play Store release still needs a proper release keystore + signing
        # config wired into app/build.gradle before switching this to
        # assembleRelease.

      - name: Check deploy credentials are configured
        id: creds
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::FIREBASE_SERVICE_ACCOUNT secret is not set — skipping distribution. See docs/DEPLOY.md for setup."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Distribute to Firebase App Distribution
        if: steps.creds.outputs.configured == 'true'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:404381833719:android:5df93f9adcee078f4d36f2
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: internal-testers
          file: frontend-angular/android/app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: "Automated build from ${{ github.sha }}"
        # firebase-tools' own `appdistribution:distribute` CLI command does not
        # reliably authenticate via GOOGLE_APPLICATION_CREDENTIALS or
        # --service-account-json in CI (confirmed: both failed with "Failed to
        # authenticate, have you run firebase login?" even with a valid service
        # account key present) — this action is purpose-built for App
        # Distribution auth and takes the raw JSON key content directly.
