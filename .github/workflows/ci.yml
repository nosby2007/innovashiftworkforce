name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (build + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-angular
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-angular/package-lock.json
      - run: npm ci
      - run: npx tsc -p tsconfig.app.json --noEmit
      - run: npm run prerender

  functions:
    name: Cloud Functions (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-firebase-functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend-firebase-functions/package-lock.json
      - run: npm ci
      - run: npm run build
